<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Aggiornamento OTA</title><style>body{font-family:Arial;background:#f5f5f5;color:#333;margin:0}header{background:#000;color:white;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}.container{max-width:1000px;margin:20px auto;padding:0 20px}nav{background:#000;padding:10px;display:flex;justify-content:center;gap:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}nav a{color:white;text-decoration:none;padding:8px 15px;border-radius:4px;background:#2c3e50;font-weight:bold;font-size:14px;transition:.2s}nav a:hover{background:#3498db} .card{background:white;padding:25px;margin:20px auto;max-width:600px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}input,button{width:100%;padding:10px;margin:10px 0;border-radius:4px;border:1px solid #ddd;box-sizing:border-box}button{background:#e67e22;color:white;font-weight:bold;cursor:pointer}button:hover{background:#d35400}</style></head><body><header><div style='display:flex;align-items:center;'><img src='/logo.jpg' alt='Logo' style='max-height:40px;margin-right:15px;'><h1 style='margin:0;font-size:22px;'>Aggiornamento OTA [<span id='hdr_run_mode'>APP</span>] - <span id='hdr_clock'>00:00:00</span></h1><a href='#' onclick="return window.goProtectedPath('/emulator');" style='margin-left:12px;padding:6px 10px;background:#8e44ad;color:white;text-decoration:none;border-radius:6px;font-size:14px;font-weight:bold;'>Emulatore</a></div><div style='text-align:right;font-size:12px;opacity:0.8;'>v1.4.1 (2026-03-06)</div></header><nav><a href='/'>🏠 Home</a><a href='/config'>⚙️ Config</a><a href='/test'>🔧 Test</a><a href='/files'>📁 File</a><a href='/tasks'>📋 Task</a><a href='/logs'>📋 Log</a><a href='/config/programs'>📊 Programmi</a><a href='/ota'>🔄 OTA</a></nav><script>/* Global fetch wrapper: injects Authorization */(function(){if(window.__auth_wrapped) return; window.__auth_wrapped=true; const _fetch = window.fetch.bind(window);window.setAuthToken = function(t){ if(t) localStorage.setItem('httpservices_token', t); else localStorage.removeItem('httpservices_token'); };window.getAuthToken = function(){ return localStorage.getItem('httpservices_token'); };window.clearAuthToken = function(){ localStorage.removeItem('httpservices_token'); };window.fetch = function(input, init){ try{ const token = window.getAuthToken(); if(token){ init = init || {}; if(!init.headers){ init.headers = {'Authorization':'Bearer '+token}; } else if(init.headers instanceof Headers){ if(!init.headers.get('Authorization')) init.headers.set('Authorization','Bearer '+token); } else if(Array.isArray(init.headers)){ let has=false; for(const h of init.headers){ if(h[0].toLowerCase()==='authorization'){ has=true; break; } } if(!has) init.headers.push(['Authorization','Bearer '+token]); } else if(typeof init.headers==='object'){ if(!init.headers['Authorization'] && !init.headers['authorization']) init.headers['Authorization'] = 'Bearer '+token; } } }catch(e){} return _fetch(input, init); };window.goProtectedPath=function(path){window.location.href=path;return false;};(function(){function tc(){var e=document.getElementById('hdr_clock');if(e)e.textContent=new Date().toTimeString().slice(0,8);}tc();setInterval(tc,1000);})();(function(){fetch('/status',{cache:'no-store'}).then(function(r){return r.json();}).then(function(s){var el=document.getElementById('hdr_run_mode');if(el&&s&&s.partition_running)el.textContent=s.partition_running.toUpperCase();}).catch(function(){});})();})();</script><script>(function(){if(window.__ui_i18n_ready)return;window.__ui_i18n_ready=true;const lang='it';const table={}||{};const SKIP={SCRIPT:1,STYLE:1,NOSCRIPT:1};function mapText(t){if(!t)return t;return (table[t]!==undefined&&table[t]!==null)?String(table[t]):t;}function applyNode(node){if(!node)return;if(node.nodeType===Node.TEXT_NODE){const p=node.parentElement;if(p&&SKIP[p.tagName])return;const v=node.nodeValue;if(!v)return;const tt=v.trim();if(!tt)return;const tr=mapText(tt);if(tr!==tt){node.nodeValue=v.replace(tt,tr);}return;}if(node.nodeType!==Node.ELEMENT_NODE)return;if(SKIP[node.tagName])return;if(node.hasAttribute&&node.hasAttribute('data-i18n')){const k=node.getAttribute('data-i18n');if(k){const tr=mapText(k);if(tr&&tr!==k)node.textContent=tr;}}const attrs=['placeholder','title','aria-label','value'];for(const a of attrs){if(node.hasAttribute&&node.hasAttribute(a)){const ov=node.getAttribute(a);const nv=mapText(ov);if(nv!==ov)node.setAttribute(a,nv);}}for(const c of node.childNodes){applyNode(c);}}function apply(root){if(!root)return;applyNode(root);}window.uiI18n={language:lang,table:table,apply:apply,translate:mapText};document.addEventListener('DOMContentLoaded',function(){apply(document.body);const obs=new MutationObserver(function(ms){for(const m of ms){for(const n of m.addedNodes){applyNode(n);}}});obs.observe(document.body,{subtree:true,childList:true});});})();</script><div class='container'><div class='card'><form id='f'><input type='file' id='i' accept='.bin' required><button type='submit'>⬆️ Carica Firmware</button></form><div style='margin-top:10px'><progress id='p' value='0' max='100' style='width:100%;height:20px;'></progress><div id='pct' style='margin-top:6px;font-weight:bold;'>0%</div></div><div id='s' style='margin-top:10px'></div></div></div><script>document.getElementById('f').onsubmit=function(e){e.preventDefault();const file=document.getElementById('i').files[0];if(!file){return;}const p=document.getElementById('p');const pct=document.getElementById('pct');const s=document.getElementById('s');p.value=0;pct.innerText='0%';s.innerText='Upload in corso...';const x=new XMLHttpRequest();x.open('POST','/ota/upload',true);x.setRequestHeader('Content-Type','application/octet-stream');x.upload.onprogress=function(ev){if(ev.lengthComputable){const v=Math.min(100,Math.round((ev.loaded*100)/ev.total));p.value=v;pct.innerText=v+'%';}};x.onload=function(){if(x.status>=200&&x.status<300){p.value=100;pct.innerText='100%';s.innerText='✅ Successo! Riavvio...';}else{s.innerText='❌ Errore ('+x.status+')';}};x.onerror=function(){s.innerText='❌ Errore di rete';};x.send(file);};</script></body></html>
