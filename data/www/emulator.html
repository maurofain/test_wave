<!DOCTYPE html><html><head><meta charset='UTF-8'><title>{{001}}</title><style>body{font-family:Arial;background:#f5f5f5;color:#333;margin:0}header{background:#000;color:white;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}.container{max-width:1000px;margin:20px auto;padding:0 20px} .emu-wrap{width:100%;max-width:2048px;margin:16px auto;padding:0 8px;box-sizing:border-box;display:flex;gap:12px;align-items:stretch}.emu-panel{flex:0 0 720px;min-width:720px;height:1280px;background:#111;border-radius:16px;padding:14px;box-shadow:0 4px 20px rgba(0,0,0,0.25);box-sizing:border-box}.emu-layout{height:100%;display:grid;grid-template-columns:150px 1fr 64px 150px;column-gap:10px;align-items:stretch}.emu-left,.emu-right{min-width:0;display:grid;grid-template-rows:repeat(5,1fr);gap:10px}.prog-btn{width:75%;justify-self:center;border:none;border-radius:10px;background:#6c3483 !important;color:#fff;font-size:30px;font-weight:bold;cursor:pointer;padding:6px 4px;line-height:1.1}.prog-btn.active{background:#1e8b45 !important}.prog-btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}.emu-main{min-width:0;display:block}.credit-box{position:relative;background:#202048;border-radius:8px;padding:20px;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:background .2s,color .2s}.credit-box.state-credit{background:#202048;color:#fff}.credit-box.state-running{background:#1e6b35;color:#fff}.credit-box.state-paused{background:#7a4200;color:#fff}.datetime{position:absolute;top:10px;right:12px;color:#888899;font-size:32px;font-weight:700;line-height:1.1;text-align:right;white-space:pre-line;font-family:'Courier New','DejaVu Sans Mono',monospace}.credit-label{font-size:32px;color:#888899}.credit-value{font-size:165px;font-weight:bold;line-height:1;color:#eee}.secs-value{font-size:165px;font-weight:bold;line-height:1;color:#eee;display:none}.credit-value-small{font-size:52px;font-weight:bold;line-height:1.2;color:#eee;margin-top:6px;display:block}.elapsed-value{margin-top:10px;font-size:32px;font-weight:600;color:#888899}.pause-value{margin-top:4px;font-size:32px;font-weight:500;color:#e67e22}.emu-gauge{min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}.gauge-track{position:relative;width:100%;height:100%;border-radius:8px;overflow:hidden;border:3px solid #d9d9d9;background:linear-gradient(to top,#c0392b 0%,#c0392b 30%,#27ae60 30%,#27ae60 100%)}.gauge-mask{position:absolute;left:0;top:0;width:100%;height:100%;background:#111;transition:height .25s linear}.gauge-text{color:#fff;font-size:28px;font-weight:bold}.emu-electrical{flex:1;min-width:280px;background:#ffffff;border-radius:16px;padding:12px;box-shadow:0 4px 16px rgba(0,0,0,0.12);box-sizing:border-box}.side-title{margin:0 0 10px 0;color:#2c3e50;font-size:22px}.coin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}.coin-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}.coin-btn{border:none;border-radius:8px;background:#27ae60;color:#fff;padding:12px 8px;font-size:18px;font-weight:bold;cursor:pointer}.coin-btn:hover{background:#219150}.coin-btn.coin-btn-card{background:#2980b9}.coin-btn.coin-btn-card:hover{background:#1f6fa0}.coin-btn.coin-btn-cash{background:#e67e22}.coin-btn.coin-btn-cash:hover{background:#c96a12}.relay-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.relay{border-radius:8px;background:#d5d8dc;color:#2c3e50;padding:10px 4px;text-align:center;font-weight:bold;font-size:14px}.relay.on{background:#f39c12;color:#fff}.msg-box{margin-top:12px;background:#f5f7fa;border-radius:10px;padding:12px;font-size:16px;color:#2c3e50;display:block;overflow:auto;line-height:1.35;max-height:220px}.side-note{margin-top:12px;font-size:13px;color:#566573;line-height:1.4}@media(max-width:1250px){.emu-wrap{flex-direction:column;align-items:center}.emu-panel{flex:none;width:720px;min-width:720px;height:1280px}.emu-electrical{width:720px;flex:none}.msg-box{max-height:260px}}</style></head><body><header><div style='display:flex;align-items:center;'><img src='/logo.jpg' alt='Logo' style='max-height:40px;margin-right:15px;'><h1 style='margin:0;font-size:22px;'>{{002}}<span id='hdr_run_mode'>{{003}}</span>] - <span id='hdr_clock'>00:00:00</span></h1><a href='/' style='margin-left:12px;padding:6px 10px;background:#8e44ad;color:white;text-decoration:none;border-radius:6px;font-size:14px;font-weight:bold;'>{{004}}</a></div><div id='build_info' style='text-align:right;font-size:12px;opacity:0.8;'>--</div></header>{{JS:js/emulator_01.js}}{{JS:js/emulator_02.js}}<div class='emu-wrap'><div class='emu-panel'><div class='emu-layout'><div class='emu-left'><button class='prog-btn' data-id='1'>1</button><button class='prog-btn' data-id='2'>2</button><button class='prog-btn' data-id='3'>3</button><button class='prog-btn' data-id='4'>4</button><button class='prog-btn' data-id='5'>5</button></div><div class='emu-main'><div id='creditBox' class='credit-box'><div id='dateTime' class='datetime'>{{005}}</div><div id='creditLabel' class='credit-label'>{{006}}</div><div id='secsDisplay' class='secs-value'>--</div><div id='credit' class='credit-value'>0</div><div id='elapsed' class='elapsed-value'>{{007}}</div><div id='pauseElapsed' class='pause-value'>{{008}}</div></div></div><div class='emu-gauge'><div class='gauge-track'><div id='gmask' class='gauge-mask'></div></div><div id='gtext' class='gauge-text'>--</div></div><div class='emu-right'><button class='prog-btn' data-id='6'>6</button><button class='prog-btn' data-id='7'>7</button><button class='prog-btn' data-id='8'>8</button><button class='prog-btn' data-id='9'>9</button><button class='prog-btn' data-id='10'>10</button></div></div></div><div class='emu-electrical'><h2 class='side-title'>{{009}}</h2><h3 class='side-title' style='font-size:18px;margin-top:4px;'>{{010}}</h3><div class='coin-grid'><button class='coin-btn' data-coin='1' data-source='qr'>+1</button><button class='coin-btn' data-coin='5' data-source='qr'>+5</button><button class='coin-btn' data-coin='10' data-source='qr'>+10</button></div><h3 class='side-title' style='font-size:18px;margin-top:4px;'>{{011}} <label style='font-size:14px;margin-left:8px;'><input type="checkbox" id="cardSwitch"> {{012}}</label></h3><div class='coin-grid'><button class='coin-btn coin-btn-card' data-coin='1' data-source='card'>+1</button><button class='coin-btn coin-btn-card' data-coin='5' data-source='card'>+5</button><button class='coin-btn coin-btn-card' data-coin='10' data-source='card'>+10</button></div><h3 class='side-title' style='font-size:18px;margin-top:4px;'>{{013}}</h3><div class='coin-grid-2'><button class='coin-btn coin-btn-cash' data-coin='1' data-source='cash'>{{014}}</button><button class='coin-btn coin-btn-cash' data-coin='2' data-source='cash'>{{015}}</button></div><h3 class='side-title' style='font-size:18px;'>{{016}}</h3><div id='relayGrid' class='relay-grid'><div class='relay' data-relay='1'>{{017}}</div><div class='relay' data-relay='2'>{{018}}</div><div class='relay' data-relay='3'>{{019}}</div><div class='relay' data-relay='4'>{{020}}</div><div class='relay' data-relay='5'>{{021}}</div><div class='relay' data-relay='6'>{{022}}</div><div class='relay' data-relay='7'>{{023}}</div><div class='relay' data-relay='8'>{{024}}</div><div class='relay' data-relay='9'>{{025}}</div><div class='relay' data-relay='10'>{{026}}</div></div><div id='msg' class='msg-box'>{{027}}</div><div class='side-note'>{{028}}</div></div></div>{{JS:js/emulator_03.js}}</body></html>
